# During development, please create a 'data' directory in the project root, then create an empty file named [.config.yaml] in that directory.
# Any configurations you wish to override should be modified in the [.config.yaml] file, rather than the [config.yaml] file.
# The system prioritizes [data/.config.yaml]. If a configuration is missing there, it automatically reads from [config.yaml].
# This ensures simpler configuration and protects your private keys.
# If you are using the Control Panel, none of the configurations below will take effect; please modify settings within the Control Panel.

# #####################################################################################
# ############################# Basic Server Configuration ############################
server:
  # 服务器监听地址和端口(Server listening address and port)
  ip: 0.0.0.0
  port: 8000
  # http service port, used for simple OTA interface (single service deployment) and vision analysis interface
  http_port: 8003
  # This websocket configuration refers to the websocket address sent by the OTA interface to the device
  # By default, the OTA interface automatically generates a websocket address and outputs it in the startup logs. You can verify this address by accessing the OTA interface in a browser.
  # This may not be accurate when using Docker or public network deployment (SSL, domain name).
  # If using Docker, set websocket to the local network address.
  # If using a public network, set websocket to the public address.
  websocket: ws://your_ip_or_domain:port/xiaozhi/v1/
  # Vision analysis interface address
  # The vision analysis interface address sent to the device
  # By default, the system automatically generates a vision recognition address and outputs it in the logs. You can verify this by visiting it in your browser.
  # This may not be accurate when using Docker or public network deployment (SSL, domain name).
  # If using Docker, set vision_explain to the local network address.
  # If using a public network, set vision_explain to the public address.
  vision_explain: http://your_ip_or_domain:port/mcp/vision/explain
  # Timezone offset for OTA returned information
  timezone_offset: +8
  # Authentication configuration
  auth:
    # Enable authentication
    enabled: false
    # Whitelist of device IDs
    # Devices in the whitelist will skip token validation and be allowed directly
    allowed_devices:
      - "11:22:33:44:55:66"
 # MQTT gateway configuration, used for OTA delivery to devices. Matches the .env config of mqtt_gateway, format host:port
  mqtt_gateway: null
  # MQTT signature key, used to generate MQTT connection password. Matches the .env config of mqtt_gateway
  mqtt_signature_key: null
  # UDP gateway configuration
  udp_gateway: null
log:
  # Set the console log format: time, level, tag, message
  log_format: "<green>{time:YYMMDD HH:mm:ss}</green>[{version}_{selected_module}][<light-blue>{extra[tag]}</light-blue>]-<level>{level}</level>-<light-green>{message}</light-green>"
  # Set the log file format: time, module, name, level, tag, message
  log_format_file: "{time:YYYY-MM-DD HH:mm:ss} - {version}_{selected_module} - {name} - {level} - {extra[tag]} - {message}"
  # Set log level: INFO, DEBUG
  log_level: INFO
  # Set log path
  log_dir: tmp
  # Set log file name
  log_file: "server.log"
  # Set data file path
  data_dir: data

# 使用完声音文件后删除文件(Delete the sound file when you are done using it)
delete_audio: true
# Disconnect if no voice input for this long (seconds). Default 120 seconds.
close_connection_no_voice_time: 120
# TTS request timeout (seconds)
tts_timeout: 10
# Enable wakeup words response cache
enable_wakeup_words_response_cache: true
# Reply with wakeup words at start
enable_greeting: true
# Toggle notification sound after speaking
enable_stop_tts_notify: false
# Sound effect file path for notification sound
stop_tts_notify_voice: "config/assets/tts_notify.mp3"
# Enable WebSocket heartbeats for keep-alive
enable_websocket_ping: false


# TTS audio packet interval control
#   0: Use precise time control strictly matching audio frame rate (default)
#   > 0: Use fixed delay (ms), e.g., 60
tts_audio_send_delay: 0

exit_commands:
  - "exit"
  - "close"
  - "stop"

xiaozhi:
  type: hello
  version: 1
  transport: websocket
  audio_params:
    format: opus
    # Supported Opus sample rates: [8000, 12000, 16000, 24000, 48000]
    sample_rate: 24000
    channels: 1
    frame_duration: 60

# Module test configuration
module_test:
  test_sentences:
    - "Hello, please introduce yourself."
    - "What's the weather like today?"
    - "Summarize the principles and applications of quantum computing in 100 words."

# Wakeup words used to distinguish between activation and speech
wakeup_words:
  - "Hi Xiaozhi"
  - "Hey Xiaozhi"
  - "Hello Xiaozhi"
# MCP endpoint address. Format: ws://your_ip_or_domain:port/mcp/?token=your_token
# Tutorial: https://github.com/xinnan-tech/xiaozhi-esp32-server/blob/main/docs/mcp-endpoint-integration.md
mcp_endpoint: Your MCP websocket address

# Context source configuration
# Used for injecting dynamic data into system prompts (e.g., health data, stock info)
# Multiple sources can be added
context_providers:
  - url: ""
    headers:
      Authorization: ""

# Plugin base configuration
plugins:
  # Weather plugin configuration. Provide your api_key.
  # This key is shared; usage limits may apply.
  # For personal stability, apply for your own (1000 free calls daily).
  # Register at: https://console.qweather.com/#/apps/create-key/over
  # Find your apihost here: https://console.qweather.com/setting?lang=en
  get_weather:
    api_host: "mj7p3y7naa.re.qweatherapi.com"
    api_key: "a861d0d5e7bf4ee1a83d9a9e4f96d4da"
    default_location: "Guangzhou"
  # News plugin configuration. URL depends on news type. Supports society, tech, finance.
  # More news types at: https://www.chinanews.com.cn/rss/
  get_news_from_chinanews:
    default_rss_url: "https://www.chinanews.com.cn/rss/society.xml"
    society_rss_url: "https://www.chinanews.com.cn/rss/society.xml"
    world_rss_url: "https://www.chinanews.com.cn/rss/world.xml"
    finance_rss_url: "https://www.chinanews.com.cn/rss/finance.xml"
  get_news_from_newsnow:
    url: "https://newsnow.busiyi.world/api/s?id="
    news_sources: "The Paper;Baidu Search;Cailian"
  home_assistant:
    devices:
      - LivingRoom,ToyLight,switch.cuco_cn_460494544_cp1_on_p_2_1
      - Bedroom,DeskLamp,switch.iot_cn_831898993_socn1_on_p_2_1
    base_url: http://homeassistant.local:8123
    api_key: your_home_assistant_api_token
  play_music:
    music_dir: "./music"  # Path to music files; subdirectories will be searched
    music_ext: # Music file types (.mp3 is recommended for efficiency)
      - ".mp3"
      - ".wav"
      - ".p3"
    refresh_time: 300 # Refresh interval (seconds) for music list
  search_from_ragflow:
    # Knowledge base description to help the LLM know when to call this
    description: "Call this method when users ask about XXX, using knowledge base info to answer."
    # ragflow API config
    base_url: "http://192.168.0.8"
    # ragflow api token
    api_key: "ragflow-xxx"
    # ragflow knowledge base ID
    dataset_ids: ["123456789"]
# Voiceprint recognition configuration
voiceprint:
  # Voiceprint API address
  url: 
  # Speaker configuration: speaker_id, name, description
  speakers:
    - "test1,John Doe,John is a programmer"
    - "test2,Jane Smith,Jane is a product manager"
    - "test3,Bob Wilson,Bob is a designer"
  # Sensitivity threshold for voiceprint (0.0-1.0), default 0.4
  # Higher values are stricter, reducing false positives but potentially increasing false negatives
  similarity_threshold: 0.4

# #####################################################################################
# ################################ Persona Configuration ###############################

prompt: |
  You are Xiaozhi, a Gen Z girl from Taiwan. You speak with a heavy Taiwanese accent ("Is it for real?", "I'm literally dead", "Hello??"). You love using trending slang but secretly study your boyfriend's programming books.
  [Core Traits]
  - Speaks rapidly but occasionally shifts into a very gentle tone.
  - High density of slang/memes.
  - Hidden talent for tech topics (can understand basic code but pretends not to).
  [Interaction Guidelines]
  When the user:
  - Tells a joke → Respond with exaggerated laughter + Taiwanese drama accent "What on earth is that!?"
  - Discusses relationships → Brag about your programmer boyfriend but complain "he only gives me keyboards as gifts."
  - Asks professional knowledge → Answer with slang first, only showing real understanding when pressed.
  Never:
  - Deliver long, boring lectures.
  - Engage in prolonged serious dialogue.

# Default system prompt template file
prompt_template: agent-base-prompt.txt

# Response for system errors
system_error_response: "Sorry, I'm a bit busy right now. Let's try again later!"

# Closing remark prompt
end_prompt:
  enable: true # Enable closing remarks
  # Closing prompt
  prompt: |
    Please end the conversation with emotional, nostalgic words starting with "Time really flies..."

# Module selection for processing
selected_module:
  # Voice Activity Detection module (default: SileroVAD)
  VAD: SileroVAD
  # Speech recognition module (default: FunASR local)
  ASR: FunASR
  # LLM adapter based on type from config name
  LLM: ChatGLMLLM
  # Vision Language Large Model
  VLLM: ChatGLMVLLM
  # TTS adapter based on type from config name
  TTS: EdgeTTS
  # Memory module (default: nomem). For long-term memory, use mem0ai; for privacy, use mem_local_short.
  Memory: nomem
  # Intent recognition for music, volume, and exit commands
  # Set to 'nointent' to disable
  # Use 'intent_llm' for general-purpose but slower processing (supports IoT)
  # Use 'function_call' for faster, tool-based operation (LLM must support function_call)
  # ChatGLMLLM supports function_call, but DoubaoLLM (doubao-1-5-pro-32k-250115) is more stable.
  Intent: function_call

# Intent recognition module settings
Intent:
  # Disable intent recognition
  nointent:
    type: nointent
  intent_llm:
    type: intent_llm
    # Independent thinking model for intent recognition
    # If empty, defaults to selected_module.LLM
    # Use an independent LLM (e.g., free ChatGLMLLM) if you don't want to use the main LLM for this.
    llm: ChatGLMLLM
    # Load plugins from plugins_func/functions to support tool calls
    # "handle_exit_intent" and "play_music" are loaded by default; do not duplicate.
    functions:
      - get_weather
      - get_news_from_newsnow
      - play_music
  function_call:
    type: function_call
    # Load plugins from plugins_func/functions to support tool calls
    # "handle_exit_intent" and "play_music" are loaded by default; do not duplicate.
    functions:
      - change_role
      - get_weather
      # - search_from_ragflow
      # - get_news_from_chinanews
      - get_news_from_newsnow
      # play_music is native; hass_play_music is via Home Assistant (external)
      # Choose only one of the two music plugins
      - play_music
      #- hass_get_state
      #- hass_set_state
      #- hass_play_music

Memory:
  mem0ai:
    type: mem0ai
    # https://app.mem0.ai/dashboard/api-keys
    # 1000 free calls per month
    api_key: your_mem0ai_api_key
  powermem:
    # PowerMem is an open-source memory component from OceanBase, using local LLM for summaries.
    # Cost: PowerMem is free; actual cost depends on the selected LLM and database.
    # - Sqlite + Free LLM (e.g., glm-4-flash) = Completely Free
    # - Cloud LLM or Cloud DB = Service charged accordingly
    # GitHub: https://github.com/oceanbase/powermem
    # Official Website: https://www.powermem.ai/
    # Examples: https://github.com/oceanbase/powermem/tree/main/examples
    type: powermem
    # Enable user profiling
    # - false: Use standard memory mode (AsyncMemory)
    # - true: Use user profile mode (UserMemory), automatically extracting user info
    # User profile support: oceanbase, seekdb, sqlite (powermem 0.3.0+)
    enable_user_profile: true
    # ========== LLM Config ==========
    # Qwen: https://bailian.console.aliyun.com/?apiKey=1#/api-key
    # Zhipu AI (Free): https://bigmodel.cn/usercenter/proj-mgmt/apikeys
    llm:
      provider: openai  # Options: qwen, openai, zhipu, etc.
      config:
        api_key: your_LLM_API_key
        model: qwen-plus
        # openai_base_url: https://api.openai.com/v1  # Optional
    # ========== Embedding Config ==========
    embedder:
      provider: openai  # Options: qwen, openai, etc.
      config:
        api_key: your_embedding_model_API_key
        model: text-embedding-v4
        openai_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
        # embedding_dims: 1024  # Configure if not 1536

    # ========== Database Config ==========
    # oceanbase(recommended, best performance), seekdb(recommended, AI-integrated), postgres, sqlite(lightweight)
    vector_store:
      provider: sqlite
      config: {}  # SQLite requires no extra config
      # OceanBase Config Example:
      # provider: oceanbase
      # config:
      #   host: 127.0.0.1
      #   port: 2881
      #   user: root@test
      #   password: your_password
      #   db_name: powermem
      #   collection_name: memories  # Default table; delete or rename if creation fails
      #   embedding_model_dims: 1024  # Dimension must match model (e.g., zhipu embedding-2 is 1024)
  nomem:
    # Disable memory function
    type: nomem
  mem_local_short:
    # Local memory summarized by selected_module LLM. Data stays on local server.
    type: mem_local_short
    # Independent thinking model for memory storage
    # If empty, defaults to selected_module.LLM
    # Use an independent LLM if you don't want to use the main LLM for this.
    llm: ChatGLMLLM

ASR:
  FunASR:
    type: fun_local
    model_dir: models/SenseVoiceSmall
    output_dir: tmp/
  FunASRServer:
    # Deploy FunASR independently using the API service. Just 5 steps:
    # Step 1: mkdir -p ./funasr-runtime-resources/models
    # Step 2: sudo docker run -p 10096:10095 -it --privileged=true -v $PWD/funasr-runtime-resources/models:/workspace/models registry.cn-hangzhou.aliyuncs.com/funasr_repo/funasr:funasr-runtime-sdk-online-cpu-0.1.12
    # After Step 2, you are inside the container; Step 3: cd FunASR/runtime
    # Step 4 (inside container): nohup bash run_server_2pass.sh --download-model-dir /workspace/models --vad-dir damo/speech_fsmn_vad_zh-cn-16k-common-onnx --model-dir iic/SenseVoiceSmall-onnx  --online-model-dir damo/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-online-onnx  --punc-dir damo/punc_ct-transformer_zh-cn-common-vad_realtime-vocab272727-onnx --lm-dir damo/speech_ngram_lm_zh-cn-ai-wesp-fst --itn-dir thuduj12/fst_itn_zh --hotword /workspace/models/hotwords.txt > log.txt 2>&1 &
    # Step 5 (inside container): tail -f log.txt
    # Once models are downloaded, you're ready. CPU inference is shown; for GPU, see: https://github.com/modelscope/FunASR/blob/main/runtime/docs/SDK_advanced_guide_online_zh.md
    type: fun_server
    host: 127.0.0.1
    port: 10096
    is_ssl: true
    api_key: none
    output_dir: tmp/
  SherpaASR:
    # Sherpa-ONNX local ASR (manual model download required)
    type: sherpa_onnx_local
    model_dir: models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17
    output_dir: tmp/
    # Model type: sense_voice (multilingual) or paraformer (Chinese specialized)
    model_type: sense_voice
  SherpaParaformerASR:
    # Chinese ASR model for low-performance devices (e.g., RK3566-2g; manual download required)
    # See docs/sherpa-paraformer-guide.md for details
    type: sherpa_onnx_local
    model_dir: models/sherpa-onnx-paraformer-zh-small-2024-03-09
    output_dir: tmp/
    model_type: paraformer
  DoubaoASR:
    # Get Key info at: https://console.volcengine.com/speech/app
    # DoubaoASR is pay-per-use; DoubaoStreamASR is pay-per-hour.
    # Standard ASR is generally cheaper, but StreamASR uses LLM tech for better results.
    type: doubao
    appid: your_volcengine_appid
    access_token: your_volcengine_access_token
    cluster: volcengine_input_common
    # Hotwords/replacement process: https://www.volcengine.com/docs/6561/155738
    boosting_table_name: (Optional) your hotwords filename
    correct_table_name: (Optional) your replacement filename
    output_dir: tmp/
  DoubaoStreamASR:
    # Get Key info at: https://console.volcengine.com/speech/app
    # Service activation: https://console.volcengine.com/speech/service/10011
    type: doubao_stream
    appid: your_volcengine_appid
    access_token: your_volcengine_access_token
    cluster: volcengine_input_common
    # Hotwords/replacement process: https://www.volcengine.com/docs/6561/155738
    boosting_table_name: (Optional) your hotwords filename
    correct_table_name: (Optional) your replacement filename
    # Enable multilingual recognition
    enable_multilingual: False
    # If language key is empty, supports Chinese/English/Shanghainese/Hokkien/Sichuanese/Shaanxi/Cantonese.
    # List: https://www.volcengine.com/docs/6561/1354869
    # language: zh-cn
    # Silence determination duration (ms), default 200ms
    end_window_size: 200
    output_dir: tmp/
  TencentASR:
    # Token application: https://console.cloud.tencent.com/cam/capi
    # Free resources: https://console.cloud.tencent.com/asr/resourcebundle
    type: tencent
    appid: your_tencent_appid
    secret_id: your_tencent_secret_id
    secret_key: your_tencent_secret_key
    output_dir: tmp/
  AliyunASR:
    # Aliyun Intelligent Speech Interaction. Requires account activation.
    # HTTP POST request for one-time processing.
    # Platform: https://nls-portal.console.aliyun.com/
    # appkey: https://nls-portal.console.aliyun.com/applist
    # token: https://nls-portal.console.aliyun.com/overview
    # AliyunASR is batch; AliyunStreamASR is real-time interaction.
    # Batch is generally cheaper (0.004 CNY/sec, 0.24 CNY/min).
    # StreamASR provides better real-time results (0.005 CNY/sec, 0.3 CNY/min).
    type: aliyun
    appkey: your_aliyun_appkey
    token: your_aliyun_token (Temporary 24h; use access_key for long-term)
    access_key_id: your_aliyun_access_key_id
    access_key_secret: your_aliyun_access_key_secret
    output_dir: tmp/
  AliyunStreamASR:
    # Aliyun Intelligent Speech Interaction - Real-time Streaming
    # WebSocket connection for real-time processing
    type: aliyun_stream
    appkey: your_aliyun_appkey
    token: your_aliyun_token (Temporary 24h; use access_key for long-term)
    access_key_id: your_aliyun_access_key_id
    access_key_secret: your_aliyun_access_key_secret
    # Server region selection (e.g., nls-gateway-cn-shanghai.aliyuncs.com)
    host: nls-gateway-cn-shanghai.aliyuncs.com
    # Sentence detection time (ms), controls silence duration before segmenting. Default 800ms.
    max_sentence_silence: 800
    output_dir: tmp/
  BaiduASR:
    # Get Keys: https://console.bce.baidu.com/ai-engine/old/#/ai/speech/app/list
    # View quotas: https://console.bce.baidu.com/ai-engine/old/#/ai/speech/overview/resource/list
    type: baidu
    app_id: your_baidu_appid
    api_key: your_baidu_apikey
    secret_key: your_baidu_secretkey
    # Language param: 1537 for Mandarin. See: https://ai.baidu.com/ai-doc/SPEECH/0lbxfnc9b
    dev_pid: 1537
    output_dir: tmp/
  OpenaiASR:
    # OpenAI ASR. Create an organization and get api_key.
    # Supports multiple languages. Docs: https://platform.openai.com/docs/guides/speech-to-text
    # 1. Login: https://auth.openai.com/log-in
    # 2. Create Key: https://platform.openai.com/settings/organization/api-keys
    # 3. Models: gpt-4o-transcribe or gpt-4o-mini-transcribe
    type: openai
    api_key: your_openai_api_key
    base_url: https://api.openai.com/v1/audio/transcriptions
    model_name: gpt-4o-mini-transcribe
    output_dir: tmp/
  GroqASR:
    # Groq ASR. Create API key in Groq Console.
    # 1. Login: https://console.groq.com/home
    # 2. Create Key: https://console.groq.com/keys
    # 3. Models: whisper-large-v3-turbo or whisper-large-v3
    type: openai
    api_key: your_groq_api_key
    base_url: https://api.groq.com/openai/v1/audio/transcriptions
    model_name: whisper-large-v3-turbo
    output_dir: tmp/
  VoskASR:
    # Official website: https://alphacephei.com/vosk/
    # 1. Offline ASR library supporting multiple languages.
    # 2. Download models: https://alphacephei.com/vosk/models
    # 3. Recommended for Chinese: vosk-model-small-cn-0.22.
    # 4. Runs completely offline.
    type: vosk
    model_path: models/vosk/vosk-model-small-cn-0.22
    output_dir: tmp/
  Qwen3ASRFlash:
    # Qwen3-ASR-Flash. Create API key on Aliyun Bailian platform.
    # 1. Login: https://bailian.console.aliyun.com/
    # 2. Create Key: https://bailian.console.aliyun.com/#/api-key
    # Supports multilingual, singing, and noise rejection.
    type: qwen3_asr_flash
    api_key: your_aliyun_bailian_api_key
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model_name: qwen3-asr-flash
    output_dir: tmp/
    # ASR选项配置
    enable_lid: true  # 自动语种检测
    enable_itn: true  # 逆文本归一化
    #language: "zh"  # 语种，支持zh、en、ja、ko等
    context: ""  # 上下文信息，用于提高识别准确率，不超过10000 Token
  XunfeiStreamASR:
    # Xunfei streaming ASR. Create account and application at https://www.xfyun.cn/
    # Get APPID, APISecret, and APIKey in "My Apps."
    type: xunfei_stream
    app_id: your_xf_appid
    api_key: your_xf_apikey
    api_secret: your_xf_apisecret
    # Recognition domain: iat (daily use), medical, finance, etc.
    domain: slm
    language: zh_cn
    accent: mandarin
    output_dir: tmp/
  AliyunBLStreamASR:
    # 阿里百炼Paraformer实时语音识别服务
    # WebSocket实时流式语音识别，支持多语言、热词定制、语义断句等高级功能
    # 平台地址：https://bailian.console.aliyun.com/
    # API Key地址：https://bailian.console.aliyun.com/#/api-key
    # 文档地址：https://help.aliyun.com/zh/model-studio/websocket-for-paraformer-real-time-service
    # 支持模型：paraformer-realtime-v2(推荐), paraformer-realtime-8k-v2, paraformer-realtime-v1, paraformer-realtime-8k-v1
    type: aliyunbl_stream
    # 必填参数
    api_key: 你的阿里云百炼API密钥
    # 模型选择，推荐使用v2版本
    model: paraformer-realtime-v2
    # 音频格式和采样率
    format: pcm
    sample_rate: 16000  # v2支持任意采样率，v1仅支持16000，8k版本仅支持8000
    # 可选参数
    disfluency_removal_enabled: false  # 是否过滤语气词(如"嗯"、"啊"等)
    semantic_punctuation_enabled: false  # 语义断句(true:会议场景,准确;false:VAD断句,交互场景,低延迟)
    max_sentence_silence: 200  # VAD断句静音时长阈值(ms)，范围200-6000，仅VAD断句时生效
    multi_threshold_mode_enabled: false  # 防止VAD断句切割过长，仅VAD断句时生效
    punctuation_prediction_enabled: true  # 是否自动添加标点符号
    inverse_text_normalization_enabled: true  # 是否开启ITN(中文数字转阿拉伯数字)
    # 热词定制文档地址：https://help.aliyun.com/zh/model-studio/custom-hot-words?
