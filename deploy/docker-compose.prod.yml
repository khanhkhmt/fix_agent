name: xiaozhi-prod

services:
  xiaozhi-server:
    image: ${SERVER_IMAGE_NAME:-xiaozhi-server-custom:local}
    build:
      context: ..
      dockerfile: Dockerfile-server
    restart: always
    security_opt:
      - seccomp:unconfined
    environment:
      TZ: ${TZ:-Asia/Saigon}
      PYTHONIOENCODING: utf-8
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      LANGUAGE: en_US:en
    volumes:
      - ./data:/opt/xiaozhi-esp32-server/data
      - ./models/SenseVoiceSmall/model.pt:/opt/xiaozhi-esp32-server/models/SenseVoiceSmall/model.pt
    expose:
      - "8000"
      - "8003"
    depends_on:
      xiaozhi-db:
        condition: service_healthy
      xiaozhi-redis:
        condition: service_healthy
    mem_limit: ${SERVER_MEMORY_LIMIT:-2500m}
    cpus: ${SERVER_CPU_LIMIT:-1.2}
    networks:
      backend:
        aliases:
          - xiaozhi-esp32-server

  xiaozhi-web:
    image: ${WEB_IMAGE_NAME:-xiaozhi-web-custom:local}
    build:
      context: ..
      dockerfile: Dockerfile-web
    restart: always
    environment:
      TZ: ${TZ:-Asia/Saigon}
      SPRING_DATASOURCE_DRUID_URL: jdbc:mysql://xiaozhi-esp32-server-db:3306/xiaozhi_esp32_server?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true&connectTimeout=30000&socketTimeout=30000&autoReconnect=true&failOverReadOnly=false&maxReconnects=10
      SPRING_DATASOURCE_DRUID_USERNAME: ${MYSQL_USER:-root}
      SPRING_DATASOURCE_DRUID_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      SPRING_DATA_REDIS_HOST: xiaozhi-esp32-server-redis
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SPRING_DATA_REDIS_PORT: 6379
    volumes:
      - ./uploadfile:/uploadfile
    expose:
      - "8002"
    depends_on:
      xiaozhi-db:
        condition: service_healthy
      xiaozhi-redis:
        condition: service_healthy
    mem_limit: ${WEB_MEMORY_LIMIT:-700m}
    cpus: ${WEB_CPU_LIMIT:-0.4}
    networks:
      backend:
        aliases:
          - xiaozhi-esp32-server-web

  xiaozhi-db:
    image: mysql:${MYSQL_IMAGE_TAG:-latest}
    restart: always
    environment:
      TZ: ${TZ:-Asia/Saigon}
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-xiaozhi_esp32_server}
      MYSQL_INITDB_ARGS: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./mysql/data:/var/lib/mysql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_PASSWORD}"]
      timeout: 45s
      interval: 10s
      retries: 10
      start_period: 30s
    mem_limit: ${MYSQL_MEMORY_LIMIT:-400m}
    cpus: ${MYSQL_CPU_LIMIT:-0.2}
    networks:
      backend:
        aliases:
          - xiaozhi-esp32-server-db

  xiaozhi-redis:
    image: redis:${REDIS_IMAGE_TAG:-8.0}
    restart: always
    command:
      - /bin/sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        fi
        exec redis-server --appendonly yes
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    expose:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    mem_limit: ${REDIS_MEMORY_LIMIT:-100m}
    cpus: ${REDIS_CPU_LIMIT:-0.1}
    networks:
      backend:
        aliases:
          - xiaozhi-esp32-server-redis

  xiaozhi-edge-router:
    image: nginx:${EDGE_NGINX_TAG:-1.27-alpine}
    restart: always
    depends_on:
      - xiaozhi-server
      - xiaozhi-web
    environment:
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-100m}
      PROXY_READ_TIMEOUT: ${PROXY_READ_TIMEOUT:-300s}
      WS_PROXY_READ_TIMEOUT: ${WS_PROXY_READ_TIMEOUT:-3600s}
      VIRTUAL_HOST: ${PUBLIC_DOMAIN:-device.oriagent.com}
      LETSENCRYPT_HOST: ${PUBLIC_DOMAIN:-device.oriagent.com}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-gamo100@proton.me}
      VIRTUAL_PORT: 80
      HTTPS_METHOD: redirect
    expose:
      - "80"
    volumes:
      - ./nginx/edge-router.conf.template:/etc/nginx/templates/default.conf.template:ro
    command:
      - /bin/sh
      - -c
      - |
        envsubst '$$CLIENT_MAX_BODY_SIZE $$PROXY_READ_TIMEOUT $$WS_PROXY_READ_TIMEOUT' \
          < /etc/nginx/templates/default.conf.template \
          > /etc/nginx/conf.d/default.conf && \
        nginx -g 'daemon off;'
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/healthz | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
    mem_limit: ${EDGE_MEMORY_LIMIT:-128m}
    cpus: ${EDGE_CPU_LIMIT:-0.2}
    networks:
      - backend
      - proxy

  nginx-proxy:
    profiles: ["ssl"]
    image: nginxproxy/nginx-proxy:${NGINX_PROXY_TAG:-1.7.0}
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      DEFAULT_HOST: ${PUBLIC_DOMAIN:-device.oriagent.com}
    volumes:
      - proxy-certs:/etc/nginx/certs:ro
      - proxy-vhost:/etc/nginx/vhost.d
      - proxy-html:/usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro
    depends_on:
      - xiaozhi-edge-router
    networks:
      - proxy

  nginx-acme:
    profiles: ["ssl"]
    image: nginxproxy/acme-companion:${ACME_COMPANION_TAG:-2.6}
    restart: always
    environment:
      DEFAULT_EMAIL: ${LETSENCRYPT_EMAIL:-gamo100@proton.me}
    volumes:
      - proxy-certs:/etc/nginx/certs
      - proxy-vhost:/etc/nginx/vhost.d
      - proxy-html:/usr/share/nginx/html
      - proxy-acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - nginx-proxy
    networks:
      - proxy

networks:
  backend:
    driver: bridge
  proxy:
    driver: bridge

volumes:
  redis-data:
  proxy-certs:
  proxy-vhost:
  proxy-html:
  proxy-acme:
