version: '3.8'

services:
  # MySQL cho Backend
  mysql:
    image: mysql:8.0
    container_name: xiaozhi-dev-mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=xiaozhi_esp32_server
      - MYSQL_USER=xiaozhi
      - MYSQL_PASSWORD=xiaozhi123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # Redis cho Backend
  redis:
    image: redis:7-alpine
    container_name: xiaozhi-dev-redis
    restart: always
    ports:
      - "6379:6379"

  # Backend API
  manager-api:
    build:
      context: ./main/manager-api
      dockerfile: Dockerfile
    container_name: xiaozhi-dev-api
    restart: always
    ports:
      - "8002:8002"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_DRUID_URL=jdbc:mysql://mysql:3306/xiaozhi_esp32_server?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true
      - SPRING_DATASOURCE_DRUID_USERNAME=root
      - SPRING_DATASOURCE_DRUID_PASSWORD=123456
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      - mysql
      - redis

networks:
  default:
    name: xiaozhi-dev-net

volumes:
  mysql_data:
